<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">
    <title>Dashboard - Facilitador | UPTEC Cursos</title>
    <link rel="stylesheet" href="../../../frontend/css/main.css">
</head>
<body>

<div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
        <header class="header">
            <button class="sidebar-toggle" id="sidebar-toggle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h1 class="header__title">Panel de Facilitador</h1>
            <div class="header__actions">
                <div class="header__user">
                    <div class="header__user-avatar" id="header-avatar"></div>
                    <div class="header__user-info">
                        <span class="header__user-name" id="header-user"></span>
                        <span class="header__user-role" id="header-role"></span>
                    </div>
                </div>
                <button class="header__logout" id="logout-btn" title="Cerrar Sesion">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <div class="content">
            <div class="content__header">
                <div>
                    <h2 class="content__title">Bienvenido, <span id="user-name"></span></h2>
                    <p class="content__subtitle">Gestiona tus cursos y las calificaciones de tus estudiantes</p>
                </div>
            </div>

            <div class="grid grid--3" id="stats-container">
                <div class="stat-card skeleton" style="height: 140px;"></div>
                <div class="stat-card skeleton" style="height: 140px;"></div>
                <div class="stat-card skeleton" style="height: 140px;"></div>
            </div>

            <div class="card" style="margin-top: 1.5rem;">
                <div class="card__header">
                    <h3 class="card__title">Mis Cursos Asignados</h3>
                    <a href="mis-cursos.html" class="btn btn--sm btn--ghost">Ver todos</a>
                </div>
                <div class="card__body" id="mis-cursos">
                    <div class="skeleton" style="height: 200px;"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="../../../frontend/js/api.js"></script>
<script src="../../../frontend/js/auth.js"></script>
<script src="../../../frontend/js/dashboard.js"></script>
<script>
(async function() {
    await initDashboard();
    if (AUTH.user) document.getElementById('user-name').textContent = AUTH.user.nombre;

    try {
        const data = await API.get('resumen');
        if (data.success) {
            renderStats(data);
            renderMisCursos(data.cursos_activos || []);
        }
    } catch (err) {
        Toast.show('Error: ' + err.message, 'error');
    }
})();

function renderStats(data) {
    const stats = [
        { icon: '📚', cls: 'stat-card__icon--primary', value: data.mis_cursos || 0, label: 'Mis Cursos' },
        { icon: '👨‍🎓', cls: 'stat-card__icon--accent', value: data.mis_estudiantes || 0, label: 'Mis Estudiantes' },
        { icon: '📋', cls: 'stat-card__icon--secondary', value: data.cursos_activos?.filter(c => c.estado === 'En Curso').length || 0, label: 'Activos Ahora' }
    ];
    document.getElementById('stats-container').innerHTML = stats.map(s => `
        <div class="stat-card">
            <div class="stat-card__header"><div class="stat-card__icon ${s.cls}">${s.icon}</div></div>
            <div class="stat-card__value">${Utils.formatNumber(s.value)}</div>
            <div class="stat-card__label">${s.label}</div>
        </div>
    `).join('');
}

function renderMisCursos(cursos) {
    const container = document.getElementById('mis-cursos');
    if (!cursos.length) { container.innerHTML = '<div class="empty-state">No tienes cursos asignados</div>'; return; }
    DataTable.render('mis-cursos', cursos, [
        { label: 'Codigo', key: 'codigo', format: (v, r) => `<strong>${v}</strong><br><small>${Utils.escapeHtml(r.nombre)}</small>` },
        { label: 'Area', key: 'area' },
        { label: 'Inscritos/Cupo', key: 'total_inscritos', format: (v, r) => `${v || 0}/${r.cupo_maximo}` },
        { label: 'Estado', key: 'estado', format: (v) => `<span class="badge ${v === 'En Curso' ? 'badge--accent' : v === 'Finalizado' ? 'badge--neutral' : 'badge--primary'}">${v}</span>` },
        { label: 'Fechas', key: 'fecha_inicio', format: (v, r) => `<small>${Utils.formatDate(v)}<br>${Utils.formatDate(r.fecha_fin)}</small>` }
    ], {
        actions: [
            { icon: '📋', title: 'Ver Estudiantes', class: 'btn btn--sm btn--primary', onClick: (row) => `window.location.href='estudiantes.html?curso=${row.id}'` }
        ]
    });
}
</script>

</body>
</html>
