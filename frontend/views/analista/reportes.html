<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">
    <title>Reportes - Analista | UPTEC Cursos</title>
    <link rel="stylesheet" href="../../../frontend/css/main.css">
</head>
<body>

<div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
        <header class="header">
            <button class="sidebar-toggle" id="sidebar-toggle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h1 class="header__title">Reportes</h1>
            <div class="header__actions">
                <div class="header__user">
                    <div class="header__user-avatar" id="header-avatar"></div>
                    <div class="header__user-info">
                        <span class="header__user-name" id="header-user"></span>
                        <span class="header__user-role" id="header-role"></span>
                    </div>
                </div>
                <button class="header__logout" id="logout-btn" title="Cerrar Sesion">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <div class="content">
            <div class="content__header">
                <div>
                    <h2 class="content__title">Reportes y Estadisticas</h2>
                    <p class="content__subtitle">Visualiza estadisticas de cursos y participantes</p>
                </div>
                <button class="btn btn--primary" onclick="descargarReportePDF()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 0.5rem;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Descargar PDF
                </button>
            </div>

            <div class="grid grid--2" style="margin-bottom: 1.5rem;">
                <div class="card">
                    <div class="card__header">
                        <h3 class="card__title">Cursos por Area</h3>
                    </div>
                    <div class="card__body" id="reporte-areas">
                        <div class="skeleton" style="height: 200px;"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card__header">
                        <h3 class="card__title">Estados de Cursos</h3>
                    </div>
                    <div class="card__body" id="reporte-estados">
                        <div class="skeleton" style="height: 200px;"></div>
                    </div>
                </div>
            </div>

            <div class="card" style="margin-bottom: 1.5rem;">
                <div class="card__header">
                    <h3 class="card__title">Facilitadores y Cursos Asignados</h3>
                </div>
                <div class="card__body" id="reporte-facilitadores">
                    <div class="skeleton" style="height: 250px;"></div>
                </div>
            </div>

            <div class="card">
                <div class="card__header">
                    <h3 class="card__title">Inscripciones por Mes</h3>
                </div>
                <div class="card__body" id="reporte-inscripciones">
                    <div class="skeleton" style="height: 200px;"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="../../../frontend/js/api.js"></script>
<script src="../../../frontend/js/auth.js"></script>
<script src="../../../frontend/js/dashboard.js"></script>
<script>
(async function() {
    await initDashboard();
    await loadReportes();
})();

async function loadReportes() {
    try {
        const [resumen, cursos, facilitadores] = await Promise.all([
            API.get('resumen'),
            API.get('cursos'),
            API.get('facilitadores')
        ]);

        // Procesar datos de resumen
        renderAreas(resumen.cursos_por_area || []);
        
        // Procesar estados desde cursos
        const estadosCount = {};
        (cursos.cursos || []).forEach(c => {
            estadosCount[c.estado] = (estadosCount[c.estado] || 0) + 1;
        });
        const estados = Object.entries(estadosCount).map(([estado, cantidad]) => ({ estado, cantidad }));
        renderEstados(estados);
        
        // Procesar facilitadores
        renderFacilitadores(facilitadores.facilitadores || []);
        
        // Inscripciones por mes no disponible para analista, mostrar total
        renderInscripciones([{ mes: 'Total Inscripciones', cantidad: resumen.total_inscripciones || 0 }]);
    } catch (err) {
        Toast.show('Error cargando reportes: ' + err.message, 'error');
    }
}

async function descargarReportePDF() {
    try {
        Toast.show('Generando PDF...', 'info');
        await API.download('reportes-pdf', {}, `reporte.pdf`);
        Toast.show('PDF descargado exitosamente', 'success');
    } catch (err) {
        Toast.show('Error al descargar PDF: ' + err.message, 'error');
    }
}

function renderAreas(areas) {
    const container = document.getElementById('reporte-areas');
    if (!areas.length) { container.innerHTML = '<div class="empty-state">Sin datos</div>'; return; }
    const max = Math.max(...areas.map(a => a.cantidad));
    container.innerHTML = `<div style="display:flex;flex-direction:column;gap:0.875rem">${areas.map(a => `
        <div>
            <div class="d-flex justify-between" style="margin-bottom:0.375rem">
                <span style="font-weight:500;font-size:0.9375rem">${Utils.escapeHtml(a.area || 'Sin area')}</span>
                <span style="font-weight:600;color:var(--color-primary)">${a.cantidad}</span>
            </div>
            <div style="background:var(--color-border-light);border-radius:var(--radius-full);height:8px;overflow:hidden">
                <div style="background:var(--color-primary);height:100%;border-radius:var(--radius-full);width:${(a.cantidad/max*100)}%;transition:width 0.5s"></div>
            </div>
        </div>
    `).join('')}</div>`;
}

function renderEstados(estados) {
    const container = document.getElementById('reporte-estados');
    if (!estados.length) { container.innerHTML = '<div class="empty-state">Sin datos</div>'; return; }
    const total = estados.reduce((sum, e) => sum + e.cantidad, 0);
    const colores = { 'Planificado': 'var(--color-primary)', 'En Curso': 'var(--color-accent)', 'Finalizado': 'var(--color-secondary)', 'Cancelado': 'var(--color-danger)' };

    container.innerHTML = `<div style="display:flex;flex-direction:column;gap:0.875rem">${estados.map(e => `
        <div>
            <div class="d-flex justify-between" style="margin-bottom:0.375rem">
                <span style="font-weight:500;font-size:0.9375rem">${e.estado}</span>
                <span style="font-weight:600;color:var(--color-text-secondary)">${e.cantidad} (${Math.round(e.cantidad/total*100)}%)</span>
            </div>
            <div style="background:var(--color-border-light);border-radius:var(--radius-full);height:8px;overflow:hidden">
                <div style="background:${colores[e.estado] || 'var(--color-primary)'};height:100%;border-radius:var(--radius-full);width:${(e.cantidad/total*100)}%;transition:width 0.5s"></div>
            </div>
        </div>
    `).join('')}</div>`;
}

function renderFacilitadores(data) {
    const container = document.getElementById('reporte-facilitadores');
    const facilitadores = data || [];
    if (!facilitadores.length) { container.innerHTML = '<div class="empty-state">Sin datos</div>'; return; }

    DataTable.render('reporte-facilitadores', facilitadores, [
        { label: 'Facilitador', key: 'nombre_completo', format: (v, r) => `<strong>${Utils.escapeHtml(v || r.nombre + ' ' + r.apellidos)}</strong>` },
        { label: 'Cedula', key: 'cedula', format: (v) => `<small>${v}</small>` },
        { label: 'Correo', key: 'correo' },
        { label: 'Telefono', key: 'telefono' }
    ]);
}

function renderInscripciones(data) {
    const container = document.getElementById('reporte-inscripciones');
    const total = data && data.length ? data[0].cantidad : 0;
    
    container.innerHTML = `
        <div style="text-align: center; padding: 2rem;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">📝</div>
            <div style="font-size: 2.5rem; font-weight: 700; color: var(--color-secondary); margin-bottom: 0.5rem;">${Utils.formatNumber(total)}</div>
            <div style="color: var(--color-text-secondary);">inscripciones registradas en el sistema</div>
        </div>
    `;
}
</script>

</body>
</html>
