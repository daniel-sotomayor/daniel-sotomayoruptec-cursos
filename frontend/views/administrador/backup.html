<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">
    <title>Respaldo - Administrador | UPTEC Cursos</title>
    <link rel="stylesheet" href="../../../frontend/css/main.css">
</head>
<body>

<div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
        <header class="header">
            <button class="sidebar-toggle" id="sidebar-toggle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h1 class="header__title">Respaldo de Datos</h1>
            <div class="header__actions">
                <div class="header__user">
                    <div class="header__user-avatar" id="header-avatar"></div>
                    <div class="header__user-info">
                        <span class="header__user-name" id="header-user"></span>
                        <span class="header__user-role" id="header-role"></span>
                    </div>
                </div>
                <button class="header__logout" id="logout-btn" title="Cerrar Sesion">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <div class="content">
            <div class="content__header">
                <div>
                    <h2 class="content__title">Respaldo de Base de Datos</h2>
                    <p class="content__subtitle">Exporta la informacion completa del sistema</p>
                </div>
            </div>

            <div class="grid grid--2" style="max-width: 800px;">
                <div class="card" style="text-align: center;">
                    <div class="card__body" style="padding: 2.5rem;">
                        <div style="font-size: 4rem; margin-bottom: 1rem;">💾</div>
                        <h3 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem;">Respaldo Completo</h3>
                        <p style="color: var(--color-text-muted); margin-bottom: 1.5rem; font-size: 0.9375rem;">
                            Descarga un archivo SQL con toda la base de datos incluyendo todas las tablas y registros.
                        </p>
                        <button class="btn btn--primary btn--lg" onclick="doBackup('all')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            Descargar Respaldo
                        </button>
                    </div>
                </div>

                <div class="card">
                    <div class="card__header">
                        <h3 class="card__title">Tablas de la Base de Datos</h3>
                    </div>
                    <div class="card__body" id="tablas-list" style="padding: 0;">
                        <div style="padding: 1.5rem;">
                            <div class="skeleton" style="height: 200px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="../../../frontend/js/api.js"></script>
<script src="../../../frontend/js/auth.js"></script>
<script src="../../../frontend/js/dashboard.js"></script>
<script>
(async function() {
    await initDashboard();
    loadTablas();
})();

async function loadTablas() {
    try {
        const data = await API.get('tablas');
        const tablas = data.tablas || [];
        const totalRegistros = tablas.reduce((sum, t) => sum + t.registros, 0);

        document.getElementById('tablas-list').innerHTML = `
            <div style="padding: 1.25rem 1.5rem; background: var(--color-bg); border-bottom: 1px solid var(--color-border);">
                <div class="d-flex justify-between items-center">
                    <span style="font-weight: 600;">${tablas.length} tablas</span>
                    <span style="color: var(--color-text-muted); font-size: 0.875rem;">${totalRegistros.toLocaleString()} registros totales</span>
                </div>
            </div>
            <div style="padding: 0;">
                ${tablas.map(t => `
                    <div style="padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--color-border-light); display: flex; justify-content: space-between; align-items: center;">
                        <div class="d-flex items-center gap-3">
                            <span style="font-size: 1.25rem;">🗂️</span>
                            <span style="font-family: var(--font-mono); font-size: 0.875rem;">${t.nombre}</span>
                        </div>
                        <span class="badge badge--neutral">${t.registros} registros</span>
                    </div>
                `).join('')}
            </div>
            <div style="padding: 1.25rem 1.5rem; background: var(--color-bg);">
                <button class="btn btn--ghost w-full" onclick="doBackup('all')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Descargar todas las tablas
                </button>
            </div>
        `;
    } catch (err) {
        Toast.show('Error cargando tablas: ' + err.message, 'error');
    }
}

async function doBackup(tablas) {
    try {
        Toast.show('Generando respaldo...', 'info');
        const filename = 'uptec_backup_' + new Date().toISOString().slice(0, 19).replace(/:/g, '-') + '.sql';
        await API.download('backup', { tablas, formato: 'sql' }, filename);
        Toast.show('Respaldo descargado exitosamente', 'success');
    } catch (err) {
        Toast.show('Error: ' + err.message, 'error');
    }
}
</script>

</body>
</html>
