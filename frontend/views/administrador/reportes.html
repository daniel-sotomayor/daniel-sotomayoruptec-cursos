<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">
    <title>Reportes - Administrador | UPTEC Cursos</title>
    <link rel="stylesheet" href="../../../frontend/css/main.css">
</head>
<body>

<div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
        <header class="header">
            <button class="sidebar-toggle" id="sidebar-toggle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h1 class="header__title">Reportes y Estadisticas</h1>
            <div class="header__actions">
                <div class="header__user">
                    <div class="header__user-avatar" id="header-avatar"></div>
                    <div class="header__user-info">
                        <span class="header__user-name" id="header-user"></span>
                        <span class="header__user-role" id="header-role"></span>
                    </div>
                </div>
                <button class="header__logout" id="logout-btn" title="Cerrar Sesion">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <div class="content">
            <div class="content__header">
                <div>
                    <h2 class="content__title">Estadisticas del Sistema</h2>
                    <p class="content__subtitle">Rendimiento academico y metricas globales</p>
                </div>
                <button class="btn btn--primary" onclick="descargarReportePDF()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 0.5rem;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Descargar PDF
                </button>
            </div>

            <div class="grid grid--3" id="stats-container">
                <div class="stat-card skeleton" style="height: 120px;"></div>
                <div class="stat-card skeleton" style="height: 120px;"></div>
                <div class="stat-card skeleton" style="height: 120px;"></div>
            </div>

            <div class="grid grid--2" style="margin-top: 1.5rem;">
                <div class="card">
                    <div class="card__header">
                        <h3 class="card__title">Cursos por Area</h3>
                    </div>
                    <div class="card__body" id="cursos-area">
                        <div class="skeleton" style="height: 200px;"></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card__header">
                        <h3 class="card__title">Inscripciones por Mes</h3>
                    </div>
                    <div class="card__body" id="inscripciones-mes">
                        <div class="skeleton" style="height: 200px;"></div>
                    </div>
                </div>
            </div>

            <div class="card" style="margin-top: 1.5rem;">
                <div class="card__header">
                    <h3 class="card__title">Top Facilitadores</h3>
                </div>
                <div class="card__body" id="top-facilitadores">
                    <div class="skeleton" style="height: 200px;"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="../../../frontend/js/api.js"></script>
<script src="../../../frontend/js/auth.js"></script>
<script src="../../../frontend/js/dashboard.js"></script>
<script>
(async function() {
    await initDashboard();
    loadStats();
})();

async function loadStats() {
    try {
        const data = await API.get('estadisticas');
        if (data.success) {
            renderStats(data);
            renderCursosArea(data.cursos_por_area);
            renderInscripcionesMes(data.inscripciones_por_mes);
            renderTopFacilitadores(data.top_facilitadores);
        }
    } catch (err) {
        Toast.show('Error: ' + err.message, 'error');
    }
}

function renderStats(data) {
    const stats = [
        { icon: '📊', cls: 'stat-card__icon--primary', value: data.promedio_general || 0, label: 'Promedio General', change: 'notas' },
        { icon: '🎯', cls: 'stat-card__icon--accent', value: (data.tasa_aprobacion || 0) + '%', label: 'Tasa de Aprobacion', change: 'global' },
        { icon: '📚', cls: 'stat-card__icon--secondary', value: data.cursos_por_area?.length || 0, label: 'Areas de Conocimiento', change: 'activas' }
    ];

    document.getElementById('stats-container').innerHTML = stats.map(s => `
        <div class="stat-card">
            <div class="stat-card__header">
                <div class="stat-card__icon ${s.cls}">${s.icon}</div>
            </div>
            <div class="stat-card__value">${s.value}</div>
            <div class="d-flex items-center justify-between">
                <span class="stat-card__label">${s.label}</span>
                <span class="stat-card__change stat-card__change--up">${s.change}</span>
            </div>
        </div>
    `).join('');
}

function renderCursosArea(areas) {
    const container = document.getElementById('cursos-area');
    if (!areas || !areas.length) { container.innerHTML = '<div class="empty-state">Sin datos</div>'; return; }

    const max = Math.max(...areas.map(a => a.cantidad));
    container.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:0.875rem">
            ${areas.map(a => `
                <div>
                    <div class="d-flex justify-between" style="margin-bottom:0.375rem">
                        <span style="font-weight:500;font-size:0.9375rem">${Utils.escapeHtml(a.area)}</span>
                        <span style="font-weight:600;color:var(--color-primary)">${a.total}</span>
                    </div>
                    <div style="background:var(--color-border-light);border-radius:var(--radius-full);height:8px;overflow:hidden">
                        <div style="background:var(--color-primary);height:100%;border-radius:var(--radius-full);width:${(a.total/max*100)}%;transition:width 0.5s"></div>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

function renderInscripcionesMes(meses) {
    const container = document.getElementById('inscripciones-mes');
    if (!meses || !meses.length) { container.innerHTML = '<div class="empty-state">Sin datos</div>'; return; }

    const max = Math.max(...meses.map(m => m.total));
    container.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:0.875rem">
            ${meses.map(m => `
                <div>
                    <div class="d-flex justify-between" style="margin-bottom:0.375rem">
                        <span style="font-weight:500;font-size:0.9375rem">${m.mes}</span>
                        <span style="font-weight:600;color:var(--color-accent)">${m.total}</span>
                    </div>
                    <div style="background:var(--color-border-light);border-radius:var(--radius-full);height:8px;overflow:hidden">
                        <div style="background:var(--color-accent);height:100%;border-radius:var(--radius-full);width:${(m.total/max*100)}%;transition:width 0.5s"></div>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

function renderTopFacilitadores(facilitadores) {
    const container = document.getElementById('top-facilitadores');
    if (!facilitadores || !facilitadores.length) { container.innerHTML = '<div class="empty-state">Sin datos</div>'; return; }

    DataTable.render('top-facilitadores', facilitadores, [
        { label: '#', key: 'nombre', format: (v, r, i) => `<strong style="color:var(--color-primary)">#${i+1}</strong>` },
        { label: 'Facilitador', key: 'nombre', format: (v) => `<strong>${Utils.escapeHtml(v)}</strong>` },
        { label: 'Cursos Impartidos', key: 'cursos_impartidos', format: (v) => `<span class="badge badge--accent">${v} cursos</span>` }
    ]);
}

async function descargarReportePDF() {
    try {
        Toast.show('Generando PDF...', 'info');
        await API.download('reportes-pdf', {}, `reporte.pdf`);
        Toast.show('PDF descargado exitosamente', 'success');
    } catch (err) {
        Toast.show('Error al descargar PDF: ' + err.message, 'error');
    }
}
</script>

</body>
</html>
